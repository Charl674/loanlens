version: 2

sources:
  - name: fred_raw
    database: LOANLENS_DB
    schema: RAW
    tables:
      - name: FRED_DELINQUENCY_RAW
        description: 'Raw FRED API data as loaded by Python ingestion script'
        columns:
          - name: SERIES_ID
            description: 'FRED series identifier e.g. DRCLACBS'
          - name: SERIES_NAME
            description: 'Human readable name of the series'
          - name: OBSERVATION_DATE
            description: 'Date of observation as YYYY-MM-DD string'
          - name: VALUE
            description: 'Rate value or . for missing periods'
          - name: UNITS
            description: 'Unit of measurement'
          - name: FREQUENCY
            description: 'Data frequency Quarterly or Monthly'
          - name: LOADED_AT
            description: 'UTC timestamp of when the row was loaded'
          - name: LOAD_BATCH_ID
            description: 'Pipeline run ID for traceability'
